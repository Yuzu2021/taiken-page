<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  line-height: 1.6;
  background: linear-gradient(#111, #ffcc00);
  color: #fff;
}

/* 共通幅 */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 0 15px;
}

/* ヘッダー */
header {
  background: #000;
  color: #ffcc00;
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
}

header h1 {
  margin: 0;
  font-size: 20px;
}

/* Instagram（小さく） */
.insta-header {
  width: 22px;
  opacity: 0.8;
  transition: 0.2s;
}
.insta-header:hover {
  opacity: 1;
}

/* ナビ */
nav {
  background: #000;
}
.nav-inner {
  padding: 8px 0;
}
nav a {
  color: #fff;
  margin-right: 15px;
  text-decoration: none;
  font-size: 14px;
}

/* ヒーロー */
.hero {
  text-align: center;
  padding: 70px 15px;
}

.impact {
  font-size: 34px;
  color: #ff0000;
  font-weight: bold;
  transform: rotate(-5deg);
  margin-bottom: 10px;
}

.hero h1 {
  font-size: 26px;
  margin: 10px 0;
}

.hero p {
  font-size: 15px;
  opacity: 0.9;
}

/* CTA */
.cta {
  background: #06C755;
  padding: 14px 26px;
  display: inline-block;
  margin-top: 20px;
  text-decoration: none;
  border-radius: 50px;
  font-size: 16px;
}

/* セクション */
.section {
  padding: 50px 0;
  text-align: center;
}

.section h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

/* トレーナー */
#about {
  background: #fff;
  color: #000;
}

#about img {
  width: 220px;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* メニュー */
.flex {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* カード */
.menu-btn {
  padding: 22px;
  border-radius: 15px;
  text-decoration: none;
  color: #fff;
  font-weight: bold;
  display: block;
  box-shadow: 0 6px 18px rgba(0,0,0,0.3);
  transition: 0.2s;
}

.menu-btn:hover {
  transform: translateY(-5px);
}

.menu-btn h3 {
  margin: 0;
  font-size: 18px;
}

.menu-btn p {
  font-size: 13px;
  margin-top: 6px;
  opacity: 0.9;
}

/* カラー */
.trial { background: #ff6600; }
.diet { background: #e60023; }
.bodymake { background: #007bff; }

/* フッター */
footer {
  background: #000;
  text-align: center;
  padding: 20px;
}

/* 固定LINE */
.line-fixed {
  position: fixed;
  bottom: 20px;
  right: 15px;
  background: #06C755;
  color: #fff;
  padding: 14px 18px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 14px;
}

/* PC */
@media(min-width:768px){
  .flex {
    flex-direction: row;
  }
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <h1>🔥 APRICOT GYM 🔥</h1>
    <a href="https://www.instagram.com/apricotgym2026">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="insta-header">
    </a>
  </div>
</header>

  

<!-- トレーナー -->
<section id="about" class="section">
  <div class="container">
    <h1>【トレーナー紹介】</h1>
    
    <img src="osato.jpg">
    <h2>🔥大里和也🔥</h2>
    
    <img src="nishimura.jpg">
    <h2>🔥西村優一🔥</h2>
    <p>
    あなた専用のトレーニングで<br>
    最短で理想の身体へ。
    </p>
  </div>
</section>

<section class="cta-character">
  <div class="cta-inner">
    
    <h2>理想の身体、ここから変わる。</h2>
    
    <p class="cta-text">
      運動未経験でも大丈夫。<br>
      無理な食事制限なしで、続けられる方法を提案します。
    </p>

    <img src="gymgirl2.jpg" alt="フィジークキャラクター">

    <p class="limit">
      【残り3名】今月の新規受付はあとわずかです
    </p>

    <a href="https://lin.ee/xUmAtVC" class="cta-btn">
      LINEで無料相談する
    </a>

  </div>
</section>



<footer>
  <p>© apricot gym</p>
</footer>

<a href="https://lin.ee/xUmAtVC" class="line-fixed">LINE予約</a>

</body>
</html>
