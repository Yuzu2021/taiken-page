<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apricot gym</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Hiragino Kaku Gothic ProN", sans-serif;
  line-height: 1.6;
  background: linear-gradient(#111, #ffcc00);
  color: #fff;
}

/* 共通幅 */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 0 15px;
}

/* ヘッダー */
header {
  background: #000;
  color: #ffcc00;
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
}

header h1 {
  margin: 0;
  font-size: 20px;
}

/* Instagram */
.insta-header {
  width: 22px;
  opacity: 0.8;
  transition: 0.2s;
}
.insta-header:hover {
  opacity: 1;
}

/* ===== CTAエリア ===== */
.cta-character {
  text-align: center;
  padding: 40px 15px;
}

/* 画像修正 ←これが重要 */
.cta-character img {
  width: 100%;
  max-width: 320px;
  height: auto;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* 残り人数 */
.limit {
  color: #ff4444;
  font-weight: bold;
  margin-bottom: 15px;
}

/* ボタン */
.cta-btn {
  display: inline-block;
  background: #06C755;
  color: #fff;
  padding: 14px 26px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 16px;
  font-weight: bold;
  transition: 0.2s;
}

.cta-btn:hover {
  transform: scale(1.05);
}

/* フッター */
footer {
  background: #000;
  text-align: center;
  padding: 20px;
}

/* 固定LINE */
.line-fixed {
  position: fixed;
  bottom: 20px;
  right: 15px;
  background: #06C755;
  color: #fff;
  padding: 14px 18px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <h1>🔥 APRICOT GYM 🔥</h1>
    <a href="https://www.instagram.com/apricotgym2026">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="insta-header">
    </a>
  </div>
</header>

<section class="cta-character">
    <img src="taikengym.jpg" alt="フィジークキャラクター">

    <p class="limit">
      【残り3名】今月の新規受付はあとわずかです
    </p>

    <a href="https://lin.ee/xUmAtVC" class="cta-btn">
      LINEで無料相談する
    </a>
</section>

<footer>
  <p>© apricot gym</p>
</footer>

<a href="https://lin.ee/xUmAtVC" class="line-fixed">LINE予約</a>

</body>
</html>
